services:
  db:
    image: postgres:16-alpine
    container_name: ops-postgres
    environment:
      POSTGRES_DB: orderprocessingsystem_db
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderprocessingsystem_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: your-registry/orderprocessingsystem:latest   # <-- set your registry path
    container_name: ops-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/orderprocessingsystem_db
      DB_USERNAME: orderuser
      DB_PASSWORD: orderpass
      JWT_SECRET: 8Tm0lx6P1dSctoLxxlQ4ZSCwS+UByOdSItcQPd6V1CM=
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/orderProcessingSystem/v1/healthCheck/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  pgdata:
