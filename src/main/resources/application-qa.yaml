# QA profile. Secrets come from environment variables (nothing sensitive committed).
# Activate with -Dspring-boot.run.profiles=qa (or SPRING_PROFILES_ACTIVE=qa).
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orderprocessingsystem_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      # QA keeps its schema across restarts
      ddl-auto: update
  sql:
    init:
      mode: never

app:
  jwt:
    secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    # Console shows DEBUG in qa; the file appender filters to info/warn/error
    com.test.orderProcessingSystem: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
