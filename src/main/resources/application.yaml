logging:
  level:
    root: INFO
    # Application logs at DEBUG in dev; set to TRACE to see method entry/exit
    com.test.orderProcessingSystem: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    # [%X{requestId}] surfaces the per-request correlation id on every line
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"